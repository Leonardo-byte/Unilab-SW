<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLab - Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .login-card .card-body {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .login-error {
            display: none;
            color: #ef4444;
            font-size: 0.9rem;
            margin: 0;
        }

        .login-hint {
            font-size: 0.8rem;
            color: var(--text-secondary, #6b7280);
            margin: 4px 0 0 0;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="navbar-content">
            <h1 class="navbar-title">UniLab Dashboard</h1>
        </div>
    </div>

    <div class="login-page">
        <div class="card login-card">
            <div class="card-header">
                <h2>Iniciar sesión</h2>
            </div>
            <div class="card-body">
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input id="username" name="username" type="text" class="form-input"
                               autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input id="password" name="password" type="password" class="form-input"
                               autocomplete="current-password" required>
                    </div>
                    <p id="login-error" class="login-error"></p>
                    <button type="submit" class="btn btn-primary" id="login-submit">Ingresar</button>
                    <p class="login-hint">Usuario de prueba: <strong>admin</strong> / <strong>admin1234</strong></p>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
